<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <title>Markdown Blog Preview</title>
    <meta name="viewport" content="width=device-width">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="renderer" content="webkit">
    <!-- 引入VSCode的样式 -->
    <link rel="stylesheet" type="text/css" href="[insert-vscode-approot]/out/vs/workbench/workbench.desktop.main.css">
    <!-- 用于样式确认，方便查看，发布时移除 -->
    <link rel="stylesheet" type="text/css" href="workbench.desktop.main.css">
    <style>
        :root {
            --settings-height: 52px;
        }

        body {
            margin: 0;
            color: var(--vscode-foreground);
            background-color: var(--vscode-editor-background);
            overflow: hidden;
        }

        select.monaco-select-box {
            background-color: var(--vscode-dropdown-background);
            color: var(--vscode-dropdown-foreground);
            border-color: var(--vscode-dropdown-border);
            width: 90px;
        }

        label {
            margin: 0 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .monaco-button {
            color: var(--vscode-button-foreground);
            background-color: var(--vscode-button-background);
        }

        .monaco-button:hover {
            color: var(--vscode-button-foreground);
            background-color: var(--vscode-button-hoverBackground);
        }

        .settings {
            position: fixed;
            left: 0;
            right: 0;
            width: 100%;
            top: 0;
            z-index: 10;
            background: var(--vscode-editor-background);
            border-bottom: inset 1px rgb(0 0 0 / 10%);
        }

        .settings .monaco-button {
            width: 95%;
            margin: 0 auto;
        }

        .settings-body {
            display: flex;
            margin: 8px;
        }

        .settings-item {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .preview-wrapper {
            justify-content: center;
            display: flex;
            overflow-y: auto;
            overflow-x: auto;
            margin-top: var(--settings-height);
            height: calc(100vh - var(--settings-height));
            padding: 20px;
            box-sizing: border-box;
        }

        .preview {
            margin: 0 auto;
            min-height: 100px;
            width: 375px;
            padding: 20px;
            font-size: 14px;
            box-shadow: 0 0 60px rgb(0 0 0 / 10%);
            background: #fff;
            overflow-wrap: anywhere;
        }

        #view-host {
            width: 100%;
        }
    </style>
    <insert-vscode-resource />
</head>

<body>

<div class="settings">
    <div class="settings-body">
        <div class="settings-item">
            <label>平台</label>
            <select title="选择预览平台" id="platform" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                tabindex="-1" data-focusable="true">
                <option value="wechat">微信公众号</option>
                <option value="bilibili">哔哩哔哩</option>
            </select>
        </div>
        <div class="settings-item">
            <label>字体</label>
            <select title="选择字体大小" id="font-size" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                tabindex="-1" data-focusable="true">
                <option value="14" style="font-size: 14px;">14px 稍小</option>
                <option value="15" style="font-size: 15px;" selected>15px 默认</option>
                <option value="16" style="font-size: 16px;">16px 稍大</option>
                <option value="17" style="font-size: 17px;">17px 很大</option>
            </select>
        </div>
        <div class="settings-item">
            <label>主题</label>
            <select id="theme" title="选择主题" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                tabindex="-1" data-focusable="true">
                <option value="0">默认</option>
                <option value="15">自定义</option>
            </select>
        </div>
        <div class="settings-item">
            <a class="monaco-button monaco-text-button" id="copy" tabindex="0" role="button" title="点击复制">
                <div class="monaco-button-label">复制</div>
            </a>
        </div>

    </div>

</div>


    <div class="preview-wrapper">
        <section>
        <div class="preview">
            <div id="view-host">

            </div>
        </div>
    </section>
</div>



<script>
    const vscode = acquireVsCodeApi();
    const previewWrapper = document.getElementsByClassName("preview-wrapper")[0];
    const previewInfo = document.getElementsByClassName("preview")[0];
    const platformSelect = document.getElementById("platform");
    const fontSizeSelect = document.getElementById("font-size");
    const viewHost = document.getElementById("view-host");
    let syncingFromExtension = false;

    const shadowRoot = viewHost.attachShadow({ mode: "open" });
    const shadowStyle = document.createElement("style");
    shadowStyle.textContent = `
        :host { display: block; }
        #view {
            line-height: 1.75;
            color: #333;
            word-break: break-word;
        }
        #view img {
            max-width: 100%;
            height: auto;
        }
        #view pre {
            overflow: auto;
            padding: 12px;
            background: #f7f7f7;
            border-radius: 6px;
        }
        #view blockquote {
            margin: 0;
            padding-left: 12px;
            border-left: 4px solid #ddd;
            color: #666;
        }
    `;
    const shadowView = document.createElement("div");
    shadowView.id = "view";
    shadowRoot.append(shadowStyle, shadowView);

    function applyPlatformWidth(platform) {
        previewInfo.style.width = platform === "bilibili" ? "680px" : "375px";
    }

    function applyFontSize(fontSize) {
        const parsed = Number(fontSize);
        if (!Number.isNaN(parsed) && parsed > 0) {
            previewInfo.style.fontSize = `${parsed}px`;
        }
    }

    applyPlatformWidth(platformSelect.value);
    applyFontSize(fontSizeSelect.value);

    platformSelect.addEventListener("change", () => {
        applyPlatformWidth(platformSelect.value);
    });

    fontSizeSelect.addEventListener("change", () => {
        applyFontSize(fontSizeSelect.value);
    });

    window.addEventListener("message", event => {
        const message = event.data;
        switch (message.command) {
            case "scroll": {
                syncingFromExtension = true;
                previewWrapper.scrollTo(0, previewInfo.clientHeight * message.data);
                requestAnimationFrame(() => {
                    syncingFromExtension = false;
                });
                break;
            }

            case "renderMarkdown": {
                shadowView.innerHTML = message.data;
                break;
            }
        }
    });
    async function copyPreviewContent() {
        const html = shadowView.innerHTML;
        const plainText = shadowView.textContent || "";

        if (!html || !html.trim()) {
            return false;
        }

        if (navigator.clipboard && window.ClipboardItem) {
            try {
                const item = new ClipboardItem({
                    "text/html": new Blob([html], { type: "text/html" }),
                    "text/plain": new Blob([plainText], { type: "text/plain" })
                });
                await navigator.clipboard.write([item]);
                return true;
            } catch {
            }
        }

        const temp = document.createElement("div");
        temp.setAttribute("contenteditable", "true");
        temp.style.position = "fixed";
        temp.style.left = "-99999px";
        temp.style.top = "0";
        temp.innerHTML = html;
        document.body.appendChild(temp);

        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(temp);

        if (selection) {
            selection.removeAllRanges();
            selection.addRange(range);
        }

        const copied = document.execCommand("copy");

        if (selection) {
            selection.removeAllRanges();
        }
        document.body.removeChild(temp);
        return copied;
    }

    // 点击复制富文本信息到剪贴板
    document.getElementById("copy").addEventListener("click", async () => {
        const copied = await copyPreviewContent();
        vscode.postMessage({
            command: "msg",
            data: {
                type: copied ? "success" : "warning",
                message: copied ? "复制成功" : "复制失败"
            }
        });
    });
    // 滚动同步
    previewWrapper.addEventListener("scroll", () => {
        if (syncingFromExtension) {
            return;
        }
        const scrollTop = previewWrapper.scrollTop;
        const scrollHeight = previewWrapper.scrollHeight;
        const clientHeight = previewWrapper.clientHeight;
        const denominator = scrollHeight - clientHeight;
        if (denominator <= 0) {
            return;
        }
        const scrollPercent = scrollTop / denominator;
        vscode.postMessage({
            command: "scroll",
            data: scrollPercent
        });
    });
</script>
</body>

</html>
