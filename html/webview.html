<body>
    <select class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target">
        <option>ęµ‹čÆ•ęµ‹čÆ•</option>
        <option>ęµ‹čÆ•ęµ‹čÆ•</option>
        <option>ęµ‹čÆ•ęµ‹čÆ•</option>
        <option>ęµ‹čÆ•ęµ‹čÆ•</option>
    </select>
    <div id="view"></div>
    <script>
        const vscode = acquireVsCodeApi();
        window.addEventListener("message", event => {
            const message = event.data;
            switch (message.command) {
                case "saveSvg": {
                    let svg = document.querySelectorAll("svg")[0];
                    svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                    vscode.postMessage({ command: "saveSvgData", html: svg.outerHTML });
                    break;
                }

                case "renderMarkdown": {
                    document.getElementById("view").innerHTML = message.data
                    break;
                }
            }
        });
    </script>
</body>
</html>
