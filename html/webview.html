<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <title>Markdown Blog Preview</title>
    <meta name="viewport" content="width=device-width">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="renderer" content="webkit">
    <!-- 引入VSCode的样式 -->
    <link rel="stylesheet" type="text/css" href="[insert-vscode-approot]/out/vs/workbench/workbench.desktop.main.css">
    <style>
        :root {
            --settings-height: 128px;
        }

        body {
            margin: 0;
            color: var(--vscode-foreground);
            background-color: var(--vscode-editor-background);
            overflow: hidden;
        }

        select.monaco-select-box {
            background-color: var(--vscode-dropdown-background);
            color: var(--vscode-dropdown-foreground);
            border-color: var(--vscode-dropdown-border);
            width: 90px;
        }

        label {
            margin: 0 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .monaco-button {
            color: var(--vscode-button-foreground);
            background-color: var(--vscode-button-background);
        }

        .monaco-button:hover {
            color: var(--vscode-button-foreground);
            background-color: var(--vscode-button-hoverBackground);
        }

        .settings {
            position: fixed;
            left: 0;
            right: 0;
            width: 100%;
            top: 0;
            z-index: 10;
            background: var(--vscode-editor-background);
            border-bottom: inset 1px rgb(0 0 0 / 10%);
        }

        .settings .monaco-button {
            width: 95%;
            margin: 0 auto;
        }

        .settings-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px;
        }

        .settings-row {
            display: flex;
            gap: 8px;
        }

        .settings-item {
            flex: 1;
            display: flex;
            align-items: center;
        }

        #image-host-row {
            display: none;
            gap: 8px;
            flex-wrap: wrap;
        }

        #upload-images[disabled],
        #upload-wx-draft[disabled] {
            cursor: not-allowed;
            opacity: 0.6;
        }

        #upload-images,
        #upload-wx-draft {
            width: auto;
            padding: 4px 10px;
            margin-left: 8px;
            white-space: nowrap;
        }

        #upload-wx-draft {
            display: none;
        }

        .preview-wrapper {
            justify-content: center;
            display: flex;
            overflow-y: auto;
            overflow-x: auto;
            margin-top: var(--settings-height);
            height: calc(100vh - var(--settings-height));
            padding: 20px;
            box-sizing: border-box;
        }

        .preview {
            margin: 0 auto;
            min-height: 100px;
            width: 375px;
            padding: 20px;
            font-size: 14px;
            box-shadow: 0 0 60px rgb(0 0 0 / 10%);
            background: #fff;
            overflow-wrap: anywhere;
        }

        #view-host {
            width: 100%;
        }
    </style>
    <insert-vscode-resource/>
</head>

<body>

<div class="settings">
    <div class="settings-body">
        <div class="settings-row">
            <div class="settings-item">
                <label>字号</label>
                <select title="选择字体大小" id="font-size" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                    tabindex="-1" data-focusable="true">
                    <option value="14" style="font-size: 14px;">14px 稍小</option>
                    <option value="15" style="font-size: 15px;" selected>15px 默认</option>
                    <option value="16" style="font-size: 16px;">16px 稍大</option>
                    <option value="17" style="font-size: 17px;">17px 很大</option>
                </select>
            </div>
            <div class="settings-item">
                <label>字体</label>
                <select id="font-family" title="选择字体" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                    tabindex="-1" data-focusable="true">
                    <option value="sans" selected>无衬线</option>
                    <option value="serif">衬线</option>
                </select>
            </div>
            <div class="settings-item">
                <label>主题</label>
                <select id="theme" title="选择主题" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                    tabindex="-1" data-focusable="true">
                </select>
            </div>
        </div>
        <div class="settings-row">
            <div class="settings-item">
                <label>代码主题</label>
                <select id="code-theme" title="选择代码主题" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                    tabindex="-1" data-focusable="true">
                </select>
            </div>
            <div class="settings-item">
                <label>
                    <input id="convert-links-to-references" type="checkbox">
                    外链转引用
                </label>
            </div>
            <div class="settings-item">
                <label>
                    <input id="wechat-adaptation" type="checkbox">
                    微信公众号适配
                </label>
            </div>

        </div>

        <div class="settings-row">
            <div class="settings-item" id="image-host-row">
                <label>图床</label>
                <select id="image-host" title="选择图床" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                        tabindex="-1" data-focusable="true">
                </select>
                <label>水印</label>
                <select id="watermark-style" title="选择水印样式" class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                        tabindex="-1" data-focusable="true">
                </select>
                <a class="monaco-button monaco-text-button" id="upload-images" tabindex="0" role="button" title="上传本地图片">
                    <div class="monaco-button-label">上传图片</div>
                </a>
                <a class="monaco-button monaco-text-button" id="upload-wx-draft" tabindex="0" role="button" title="上传微信草稿">
                    <div class="monaco-button-label">上传草稿</div>
                </a>
            </div>
        </div>

        <div class="settings-row">
            
            <div class="settings-item">
                <a class="monaco-button monaco-text-button" id="copy" tabindex="0" role="button" title="点击复制">
                    <div class="monaco-button-label">复制</div>
                </a>
            </div>
        </div>

    </div>

</div>


    <div class="preview-wrapper">
        <section>
        <div class="preview">
            <div id="view-host">

            </div>
        </div>
    </section>
</div>

</body>

</html>
