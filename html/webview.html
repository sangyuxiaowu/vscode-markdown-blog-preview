<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <title>Markdown Blog Preview</title>
    <meta name="viewport" content="width=device-width">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="renderer" content="webkit">
    <link rel="stylesheet" type="text/css" href="[insert-vscode-approot]/out/vs/workbench/workbench.desktop.main.css">
    <link rel="stylesheet" type="text/css" href="workbench.desktop.main.css">
    <style>
        select {
            background-color: var(--vscode-dropdown-background);
            color: var(--vscode-dropdown-foreground);
            border-color: var(--vscode-dropdown-border);
        }
        .monaco-button{
            color: var(--vscode-button-foreground);
            background-color: var(--vscode-button-background);
        }
        .monaco-button:hover{
            color: var(--vscode-button-foreground);
            background-color: var(--vscode-button-hoverBackground);
        }


        .settings-editor{
            position: fixed;
            width: 100%;
            top: 0;
        }
        .settings-editor .monaco-button{
            width: 95%;
            margin: 0 auto;
        }

        .settings-tree-container {
            display: flex;
        }

        .settings-tree-container>div {
            flex: 1;
        }

        .preview-wrapper{
            box-shadow: inset 0 0 0 1px rgb(0 0 0 / 10%);
            justify-content: center;
            display: flex;
            overflow: scroll;
            padding: 20px;
            margin-top: 155px;
            height: calc(100vh - 195px);
        }
        .preview{
            margin: 0 auto;
            min-height: 100px;
            width: 375px;
            padding: 20px;
            font-size: 14px;
            outline: none;
            box-shadow: 0 0 60px rgb(0 0 0 / 10%);
            background: #fff;
        }
    </style>
    <insert-vscode-resource />
</head>

<div class="settings-editor">
    <div class="settings-body">
        <div class="settings-tree-container">

                <div class="setting-item-contents settings-row-inner-container is-configured">
                    <div class="setting-item-title">
                        <div class="setting-item-cat-label-container">
                            <span class="setting-item-label">适用平台</span>
                        </div>
                    </div>
                    <div class="setting-item-description">
                        <div class="setting-item-markdown">
                            <p>文章发布的平台</p>
                        </div>
                    </div>
                    <div class="setting-item-value">
                        <div class="setting-item-control select-container">
                            <select class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                                tabindex="-1" data-focusable="true">
                                <option value="wechat">微信公众号</option>
                                <option value="bilibili">哔哩哔哩</option>
                            </select>
                        </div>
                    </div>
                </div>


                <div class="setting-item-contents settings-row-inner-container is-configured">
                    <div class="setting-item-title">
                        <div class="setting-item-cat-label-container">
                            <span class="setting-item-label">字体大小</span>
                        </div>
                    </div>
                    <div class="setting-item-description">
                        <div class="setting-item-markdown">
                            <p>文章默认字体大小</p>
                        </div>
                    </div>
                    <div class="setting-item-value">
                        <div class="setting-item-control select-container">
                            <select class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                                tabindex="-1" data-focusable="true">
                                <option value="14">14px 稍小</option>
                                <option value="15">15px 默认</option>
                                <option value="16">16px 稍大</option>
                                <option value="17">17px 很大</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="setting-item-contents settings-row-inner-container is-configured">
                    <div class="setting-item-title">
                        <div class="setting-item-cat-label-container">
                            <span class="setting-item-label">样式主题</span>
                        </div>
                    </div>
                    <div class="setting-item-description">
                        <div class="setting-item-markdown">
                            <p>文章样式主题</p>
                        </div>
                    </div>
                    <div class="setting-item-value">
                        <div class="setting-item-control select-container">
                            <select class="monaco-select-box monaco-select-box-dropdown-padding setting-control-focus-target"
                                tabindex="-1" data-focusable="true">
                                <option value="0">默认主题</option>
                                <option value="15">15px 默认</option>
                            </select>
                        </div>
                    </div>
                </div>
        </div>
    </div>
    <a class="monaco-button monaco-description-button monaco-text-button" id="copy" tabindex="0" role="button" title="点击复制">
        <div class="monaco-button-label">点击复制</div>
        <div class="monaco-button-description">前往平台编辑器粘贴</div>
    </a>
</div>


    <div class="preview-wrapper">
        <section>
        <div contenteditable="true" class="preview">
            <div id="view">

            </div>
        </div>
    </section>
</div>



<script>
    const vscode = acquireVsCodeApi();
    const previewWrapper = document.getElementsByClassName("preview-wrapper")[0];
    const previeinfo = document.getElementsByClassName("preview")[0];
    window.addEventListener("message", event => {
        const message = event.data;
        switch (message.command) {
            case "scroll": {
                previewWrapper.scrollTo(0, previeinfo.clientHeight * message.data);
                break;
            }

            case "renderMarkdown": {
                document.getElementById("view").innerHTML = message.data
                break;
            }
        }
    });
</script>
</body>

</html>
